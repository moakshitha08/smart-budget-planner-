<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Budget Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <h1>Smart Budget Planner</h1>
                </div>
                <p class="tagline">Start your journey to financial freedom</p>
            </div>

            <form id="registerForm" class="auth-form active">
                <div class="form-group">
                    <label for="regUsername"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="regUsername" required placeholder="Choose a username" minlength="3">
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input">
                        <input type="password" id="regPassword" required placeholder="Create password (min 6 chars)" minlength="6">
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regIncome"><i class="fas fa-money-bill-wave"></i> Monthly Income (INR)</label>
                    <input type="number" id="regIncome" placeholder="Optional: Enter monthly income" min="0">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div id="authMessage" class="message"></div>
            
            <div style="text-align: center; margin-top: 20px;">
                <p style="color: var(--text-light); font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Login here</a></p>
            </div>
        </div>
        
        <div class="features-preview">
            <div class="feature-item">
                <i class="fas fa-chart-pie"></i>
                <span>50-30-20 Budget Rule</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-file-csv"></i>
                <span>Export to Excel</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-bell"></i>
                <span>Smart Alerts</span>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        // Simple registration using localStorage
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            var currentUser = localStorage.getItem('smart_budget_current_user');
            if (currentUser) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            // Initialize theme
            var savedTheme = localStorage.getItem('smart_budget_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Theme toggle
            var themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var newTheme = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('smart_budget_theme', newTheme);
            });
            
            // Password toggle
            var toggleBtns = document.querySelectorAll('.toggle-password');
            toggleBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var input = btn.previousElementSibling;
                    var icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
            
            // Register form
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                var username = document.getElementById('regUsername').value.trim();
                var email = document.getElementById('regEmail').value.trim();
                var password = document.getElementById('regPassword').value;
                var monthlyIncome = document.getElementById('regIncome').value;
                
                if (!username || !email || !password) {
                    showMessage('Please fill in all required fields');
                    return;
                }
                
                if (username.length < 3) {
                    showMessage('Username must be at least 3 characters');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('Password must be at least 6 characters');
                    return;
                }
                
                // Get existing users
                var users = JSON.parse(localStorage.getItem('smart_budget_users') || '[]');
                
                // Check if email already exists
                if (users.find(function(u) { return u.email.toLowerCase() === email.toLowerCase(); })) {
                    showMessage('Email already registered');
                    return;
                }
                
                // Check if username already exists
                if (users.find(function(u) { return u.username.toLowerCase() === username.toLowerCase(); })) {
                    showMessage('Username already taken');
                    return;
                }
                
                // Hash password (simple hash)
                var hash = 0;
                for (var i = 0; i < password.length; i++) {
                    var char = password.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                var hashedPassword = hash.toString(16);
                
                // Create new user
                var newUser = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2),
                    username: username,
                    email: email.toLowerCase(),
                    password: hashedPassword,
                    monthlyIncome: parseFloat(monthlyIncome) || 0,
                    createdAt: new Date().toISOString()
                };
                
                // Save to localStorage
                users.push(newUser);
                localStorage.setItem('smart_budget_users', JSON.stringify(users));
                
                // Auto-login
                var userWithoutPassword = Object.assign({}, newUser);
                delete userWithoutPassword.password;
                localStorage.setItem('smart_budget_current_user', JSON.stringify(userWithoutPassword));
                
                showMessage('Account created! Redirecting...', 'success');
                setTimeout(function() {
                    window.location.href = 'dashboard.html';
                }, 800);
            });
            
            function showMessage(message, type) {
                type = type || 'error';
                var authMessage = document.getElementById('authMessage');
                authMessage.textContent = message;
                authMessage.className = 'message ' + type;
            }
        });
    </script>
</body>
</html>
